<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>AI Interview Assistant</h1>

        <div class="tab-container">
            <button class="tab-link active" onclick="showTab('general')">General Questions</button>
            <button class="tab-link" onclick="showTab('resume')">From Resume</button>
        </div>

        <!-- General Questions Tab -->
        <div id="general" class="tab-content active">
            <form id="general-interview-form">
                <div class="form-group">
                    <label for="jobRole">Job Role</label>
                    <input type="text" id="jobRole" name="jobRole" placeholder="e.g., Senior Java Developer" required>
                </div>
                <div class="form-group">
                    <label for="experienceLevel">Experience Level</label>
                    <select id="experienceLevel" name="experienceLevel" required>
                        <option value="Intern">Intern</option>
                        <option value="Junior">Junior</option>
                        <option value="Mid">Mid-level</option>
                        <option value="Senior">Senior</option>
                        <option value="Lead">Lead</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="numberOfQuestions">Number of Questions</label>
                    <input type="number" id="numberOfQuestions" name="numberOfQuestions" min="1" max="10" value="3" required>
                </div>
                <button type="submit">Generate Questions</button>
            </form>
        </div>

        <!-- Resume Questions Tab -->
        <div id="resume" class="tab-content">
            <form id="resume-interview-form">
                <div class="form-group">
                    <label for="resumeFile">Upload Resume</label>
                    <input type="file" id="resumeFile" name="resume" accept=".pdf,.doc,.docx,.txt" required>
                    <small>Generates questions tailored to the candidate's resume.</small>
                </div>
                <div class="form-group">
                    <label for="resumeJobRole">Job Role</label>
                    <input type="text" id="resumeJobRole" name="jobRole" placeholder="e.g., Senior Java Developer" required>
                </div>
                <div class="form-group">
                    <label for="resumeExperienceLevel">Experience Level</label>
                    <select id="resumeExperienceLevel" name="experienceLevel" required>
                        <option value="Intern">Intern</option>
                        <option value="Junior">Junior</option>
                        <option value="Mid">Mid-level</option>
                        <option value="Senior">Senior</option>
                        <option value="Lead">Lead</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="resumeNumberOfQuestions">Number of Questions</label>
                    <input type="number" id="resumeNumberOfQuestions" name="numberOfQuestions" min="1" max="10" value="3" required>
                </div>
                <button type="submit">Generate From Resume</button>
            </form>
        </div>

        <div id="result-container"></div>
    </div>

    <script>
        function showTab(tabName) {
            const tabContents = document.querySelectorAll('.tab-content');
            tabContents.forEach(tab => tab.classList.remove('active'));

            const tabLinks = document.querySelectorAll('.tab-link');
            tabLinks.forEach(link => link.classList.remove('active'));

            document.getElementById(tabName).classList.add('active');
            document.querySelector(`.tab-link[onclick="showTab('${tabName}')"]`).classList.add('active');
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
